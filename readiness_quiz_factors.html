<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta lang="en">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<title>AI readiness checklist</title>
<style>
    :root {
        --AIMblue: #4353A3;
        --darkBlue: #38416D;
        --teal: #5DC8B9;
        --cream: #F1EEDE;
        --grey: #e7e9ec;
        --rust: #AF4510;
        --navy: #12195C;
        --white: #ffffff;
        --lightBlue: #AEBAE4;
    }

    body {
        font-family: "IBM Plex Sans", sans-serif;
        margin: 0;
        padding: 20px;
    }

    .quiz-container {
        max-width: 800px;
        margin: 0 auto;
        background-color: #F1EEDE30;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
    }

    .slide-container {
        padding: 30px;
        padding-top: 15px;
    }

    .slide {
        display: none;
        width: 100%;
    }

    .slide.active {
        display: block;
    }

    .slide h3 {
        color: var(--AIMblue);
        margin-bottom: 25px;
        text-align: center;
    }

    fieldset {
        border: none;
        margin: 0;
        padding: 0;
    }

    .checkContainer {
        display: flex;
        align-items: flex-start;
        margin: 20px 0;
        padding: 15px;
        background-color: var(--grey);
        border-radius: 8px;
    }

    .instructions {
        background-color: var(--cream);
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 8px;
        border-left: 4px solid var(--AIMblue);
    }

    .instructions p {
        margin: 0;
        font-size: 16px;
        line-height: 1.6;
        color: var(--darkBlue);
    }

    .checkContainer p {
        margin: 0;
        margin-right: 15px;
        flex-grow: 1;
        font-size: 16px;
        line-height: 1.4;
    }

    input[type="radio"] {
        margin: 0;
        transform: scale(1.2);
        cursor: pointer;
    }

    .navigation {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 20px 30px;
        background-color: var(--grey);
    }

    .nav-buttons {
        display: flex;
        gap: 10px;
    }

    .nav-button {
        width: 40px;
        height: 40px;
        border: 2px solid var(--AIMblue);
        background-color: var(--white);
        color: var(--AIMblue);
        border-radius: 50%;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .nav-button:hover {
        background-color: var(--lightBlue);
    }

    .nav-button.active {
        background-color: var(--AIMblue);
        color: var(--white);
    }

    .arrow-button {
        padding: 10px 20px;
        background-color: #5DC8B990;
        color: black;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }

    .arrow-button:hover:not(:disabled) {
        background-color: var(--darkBlue);
        color: white;
    }

    .arrow-button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
    }

    .submit-button {
        padding: 15px 30px;
        background-color: var(--teal);
        color: var(--white);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        margin: 20px auto;
        display: none;
    }

    .submit-button:hover {
        background-color: #4db5a5;
    }

    .submit-button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
        opacity: 0.6;
    }

    #results {
        max-width: 800px;
        margin: 15px auto;
        background-color: var(--cream);
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        display: none;
        padding: 30px;
    }

    #results h2 {
        color: var(--AIMblue);
        margin-top: 0;
    }

    #results h3 {
        color: var(--darkBlue);
        margin-top: 25px;
    }

    #results p {
        color: var(--darkBlue);
        line-height: 1.6;
    }

    #results .score-display {
        background-color: var(--teal);
        color: white;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .progress-bar {
        height: 6px;
        background-color: var(--grey);
        margin: 0 30px 20px;
        border-radius: 3px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background-color: var(--teal);
        transition: width 0.3s ease;
        width: 20%;
    }

    @media screen and (max-width: 600px) {
        .quiz-container {
            margin: 0;
        }

        .slide-container,
        .navigation,
        .instructions {
            padding: 15px;
        }

        .nav-buttons {
            gap: 5px;
        }

        .nav-button {
            width: 35px;
            height: 35px;
            font-size: 14px;
        }

        .arrow-button {
            padding: 8px 12px;
            font-size: 14px;
        }
    }
</style>
</head>
<body>
    <div class="instructions">
        <p><strong>Instructions:</strong> Use this checklist to assess where your organisation stands today. For each factor, select the description that best matches your current situation.</p>
    </div>

    <div class="quiz-container">
        <nav class="navigation" aria-label="Quiz navigation">
            <div class="nav-buttons" role="tablist">
                <button class="nav-button active" onclick="goToSlide(1)" role="tab" aria-selected="true" aria-controls="slide-1" id="tab-1" aria-label="Question 1">1</button>
                <button class="nav-button" onclick="goToSlide(2)" role="tab" aria-selected="false" aria-controls="slide-2" id="tab-2" aria-label="Question 2">2</button>
                <button class="nav-button" onclick="goToSlide(3)" role="tab" aria-selected="false" aria-controls="slide-3" id="tab-3" aria-label="Question 3">3</button>
                <button class="nav-button" onclick="goToSlide(4)" role="tab" aria-selected="false" aria-controls="slide-4" id="tab-4" aria-label="Question 4">4</button>
                <button class="nav-button" onclick="goToSlide(5)" role="tab" aria-selected="false" aria-controls="slide-5" id="tab-5" aria-label="Question 5">5</button>
            </div>
        </nav>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" role="progressbar"></div>
        </div>
        <form name="q1" onsubmit="return false" onchange="updateSubmitButton()">
            <div class="slide-container" id="slideContainer" role="region" aria-live="polite">

                <!-- Slide 1 -->
                <fieldset class="slide active" id="slide-1" role="tabpanel" aria-labelledby="tab-1">
                    <legend>
                        <h3>Data quality and structure</h3>
                    </legend>

                    <div class="checkContainer">
                        <p>
                            <label for="q1-a">Our financial data is mostly clean, well-structured and extracted from consistent systems.</label>
                        </p>
                        <input type="radio" id="q1-a" name="question1" value="a" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q1-b">Our data requires significant manual cleaning and comes from multiple inconsistent sources.</label>
                        </p>
                        <input type="radio" id="q1-b" name="question1" value="b" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q1-c">We are somewhere in between: some data is well-structured, other areas need work.</label>
                        </p>
                        <input type="radio" id="q1-c" name="question1" value="c" autocomplete="off">
                    </div>
                </fieldset>

                <!-- Slide 2 -->
                <fieldset class="slide" id="slide-2" role="tabpanel" aria-labelledby="tab-2">
                    <legend>
                        <h3>Reporting process maturity</h3>
                    </legend>

                    <div class="checkContainer">
                        <p>
                            <label for="q2-a">We have documented, repeatable reporting processes with clear templates and timelines.</label>
                        </p>
                        <input type="radio" id="q2-a" name="question2" value="a" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q2-b">Our reporting processes are largely manual and vary between periods or team members.</label>
                        </p>
                        <input type="radio" id="q2-b" name="question2" value="b" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q2-c">We have some documented processes but there is room for greater consistency.</label>
                        </p>
                        <input type="radio" id="q2-c" name="question2" value="c" autocomplete="off">
                    </div>
                </fieldset>

                <!-- Slide 3 -->
                <fieldset class="slide" id="slide-3" role="tabpanel" aria-labelledby="tab-3">
                    <legend>
                        <h3>Team comfort with AI</h3>
                    </legend>

                    <div class="checkContainer">
                        <p>
                            <label for="q3-a">Most team members have used generative AI tools and are open to using them in their work.</label>
                        </p>
                        <input type="radio" id="q3-a" name="question3" value="a" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q3-b">Few team members have tried AI tools and there is significant caution or scepticism.</label>
                        </p>
                        <input type="radio" id="q3-b" name="question3" value="b" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q3-c">There is a mix: some enthusiasts, some sceptics, and many who are undecided.</label>
                        </p>
                        <input type="radio" id="q3-c" name="question3" value="c" autocomplete="off">
                    </div>
                </fieldset>

                <!-- Slide 4 -->
                <fieldset class="slide" id="slide-4" role="tabpanel" aria-labelledby="tab-4">
                    <legend>
                        <h3>Governance readiness</h3>
                    </legend>

                    <div class="checkContainer">
                        <p>
                            <label for="q4-a">We have an AI use policy and clear guidelines for using AI in financial processes.</label>
                        </p>
                        <input type="radio" id="q4-a" name="question4" value="a" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q4-b">We have no AI-specific policies and limited governance around new technology use.</label>
                        </p>
                        <input type="radio" id="q4-b" name="question4" value="b" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q4-c">We have general technology policies that could be extended to cover AI use.</label>
                        </p>
                        <input type="radio" id="q4-c" name="question4" value="c" autocomplete="off">
                    </div>
                </fieldset>

                <!-- Slide 5 -->
                <fieldset class="slide" id="slide-5" role="tabpanel" aria-labelledby="tab-5">
                    <legend>
                        <h3>Access to AI tools</h3>
                    </legend>

                    <div class="checkContainer">
                        <p>
                            <label for="q5-a">Our organisation provides approved access to generative AI tools that accept file uploads.</label>
                        </p>
                        <input type="radio" id="q5-a" name="question5" value="a" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q5-b">We do not currently have approved access to generative AI tools.</label>
                        </p>
                        <input type="radio" id="q5-b" name="question5" value="b" autocomplete="off">
                    </div>

                    <div class="checkContainer">
                        <p>
                            <label for="q5-c">Some team members have access through individual subscriptions but there is no organisational policy.</label>
                        </p>
                        <input type="radio" id="q5-c" name="question5" value="c" autocomplete="off">
                    </div>

                    <button class="submit-button" id="submitButton" onclick="formOne()" aria-label="Submit quiz and view results">
                        Submit & View Results
                    </button>
                </fieldset>

            </div>
        </form>

        <nav class="navigation" aria-label="Quiz navigation">
            <button class="arrow-button" id="prevBtn" onclick="previousSlide()" aria-label="Previous question">
                ← Previous
            </button>
            <button class="arrow-button" id="nextBtn" onclick="nextSlide()" aria-label="Next question">
                Next →
            </button>
        </nav>
    </div>

    <!-- Results Display -->
    <div id="results" role="region" aria-live="polite" aria-label="Quiz results"></div>

<script>
let currentSlide = 1;
const totalSlides = 5;

function goToSlide(slideNumber) {
    const slides = document.querySelectorAll('.slide');
    slides.forEach(slide => slide.classList.remove('active'));
    document.getElementById(`slide-${slideNumber}`).classList.add('active');
    currentSlide = slideNumber;
    updateButtons();
    updateArrowButtons();
    updateProgressBar();
    updateSubmitButton();
}

function nextSlide() {
    if (currentSlide < totalSlides) goToSlide(currentSlide + 1);
}

function previousSlide() {
    if (currentSlide > 1) goToSlide(currentSlide - 1);
}

function updateButtons() {
    const buttons = document.querySelectorAll('.nav-button');
    buttons.forEach((btn, index) => {
        btn.classList.remove('active');
        btn.setAttribute('aria-selected', 'false');
        if (index === currentSlide - 1) {
            btn.classList.add('active');
            btn.setAttribute('aria-selected', 'true');
        }
    });
}

function updateArrowButtons() {
    document.getElementById('prevBtn').disabled = currentSlide === 1;
    document.getElementById('nextBtn').disabled = currentSlide === totalSlides;
}

function updateProgressBar() {
    const progress = (currentSlide / totalSlides) * 100;
    document.getElementById('progressFill').style.width = `${progress}%`;
}

function updateSubmitButton() {
    const submitButton = document.getElementById('submitButton');
    if (currentSlide === totalSlides) {
        submitButton.style.display = 'block';
        const form = document.forms['q1'];
        let answeredCount = 0;
        for (let i = 1; i <= totalSlides; i++) {
            const question = form.elements[`question${i}`];
            if (question && question.value) answeredCount++;
        }
        submitButton.disabled = answeredCount !== totalSlides;
    } else {
        submitButton.style.display = 'none';
    }
}

function formOne() {
    const form = document.forms['q1'];
    let countA = 0, countB = 0, countC = 0;

    for (let i = 1; i <= totalSlides; i++) {
        const question = form.elements[`question${i}`];
        if (!question || !question.value) return false;
        if (question.value === 'a') countA++;
        else if (question.value === 'b') countB++;
        else if (question.value === 'c') countC++;
    }

    const results = document.getElementById("results");
    results.style.display = "block";

    const styles = {
        'a': {
            label: 'Mostly option 1 — Well positioned',
            title: 'Ready for quick wins',
            description: 'Your organisation has the fundamentals in place. You could move to prompt template libraries and workflow integration relatively quickly, focusing on efficiency gains with clear human review processes.'
        },
        'b': {
            label: 'Mostly option 2 — Foundational work needed',
            title: 'Build the foundations first',
            description: 'Foundational work on data quality, process documentation and governance policies will deliver the greatest return before introducing AI tools at scale.'
        },
        'c': {
            label: 'Mixed results — Start small',
            title: 'Start with low-risk quick wins',
            description: 'Start with one or two low-risk quick wins to build evidence and confidence, while addressing the foundational gaps in parallel.'
        }
    };

    const maxCount = Math.max(countA, countB, countC);

    // Check for ties
    const tiedItems = [];
    if (countA === maxCount) tiedItems.push('a');
    if (countB === maxCount) tiedItems.push('b');
    if (countC === maxCount) tiedItems.push('c');

    let resultHTML = '';

    if (tiedItems.length > 1) {
        resultHTML = `<div class="score-display">Mixed results — balanced across multiple areas</div><h2>No single dominant pattern</h2><p>Your responses are evenly spread across multiple readiness levels. Consider the areas below and start with the one where quick progress is most achievable:</p>`;
        tiedItems.forEach(item => {
            resultHTML += `<h3>${styles[item].title}</h3><p>${styles[item].description}</p>`;
        });
    } else {
        const dominant = tiedItems[0];
        resultHTML = `
            <div class="score-display">${styles[dominant].label}</div>
            <h2>${styles[dominant].title}</h2>
            <p>${styles[dominant].description}</p>
        `;
    }

    // Always show the breakdown
    resultHTML += `
        <h3>Your responses</h3>
        <p>Option 1 (strong): <strong>${countA}</strong> &nbsp;|&nbsp; Option 2 (needs work): <strong>${countB}</strong> &nbsp;|&nbsp; Option 3 (mixed): <strong>${countC}</strong></p>
    `;

    results.innerHTML = resultHTML;
    results.scrollIntoView({ behavior: 'smooth' });
}

document.addEventListener('keydown', function(event) {
    if (event.target.tagName === 'INPUT') {
        if (event.key === 'Enter') event.preventDefault();
        return;
    }
    if (event.key === 'ArrowLeft') { event.preventDefault(); previousSlide(); }
    else if (event.key === 'ArrowRight') { event.preventDefault(); nextSlide(); }
});

updateArrowButtons();
updateProgressBar();
updateSubmitButton();
</script>
</body>
</html>
