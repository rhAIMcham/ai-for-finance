<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Static table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<style>
:root {
    --AIMblue: #4353A3;
    --darkBlue: #38416D;
    --teal: #5DC8B9;
    --cream: #F1EEDE;
    --grey: #e7e9ec;
    --rust: #AF4510;
    --navy: #12195C;
    --white: #ffffff;
    --lightBlue: #AEBAE4;
}

input {
    border: none;
    width: fit-content;
}

body {
    font-family: "IBM Plex Sans", sans-serif;
}

img {
    width: 220px;
}
.cardBar {
    display: flex;
    justify-content: space-evenly;
}
.imageCard {
    border-radius: 16px;
    border: solid 2px var(--lightBlue);
    text-align: center;
    padding: 20px;
    background-color: white;
    cursor: pointer;
    transition: transform 1s ease-in-out;
    transition: background-color 0.3s ease-in-out;
}
.imageCard:hover {
    background-color: var(--darkBlue);
    transform: translateY(-2px);
}
</style>
</head>
<body>
<section class="cardBar">
    <div class="imageCard">
    <img src="Images/chatgpt_logo.svg.png" alt="Icon of OpenAI's ChatGPT">
        <p>ChatGPT</p>
    </div>
    <div class="imageCard">
    <img src="Images/claude_logo.svg.png" alt="Icon of OpenAI's ChatGPT">
        <p>Claude</p>
    </div>
    <div class="imageCard">
    <img src="Images/gemini_logo.png" alt="Icon of OpenAI's ChatGPT">
        <p>Gemini</p>
    </div>
</section>
</body>
</html>
