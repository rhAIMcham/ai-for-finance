<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Static table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<style>
:root {
    --AIMblue: #4353A3;
    --darkBlue: #38416D;
    --teal: #5DC8B9;
    --cream: #F1EEDE;
    --grey: #e7e9ec;
    --rust: #AF4510;
    --navy: #12195C;
    --white: #ffffff;
    --lightBlue: #AEBAE4;
}

input {
    border: none;
    width: fit-content;
}

body {
    font-family: "IBM Plex Sans", sans-serif;
}

img {
    width: 220px;
}
.cardBar {
    display: flex;
    justify-content: space-evenly;
}
.imageCard {
    text-align: center;
    padding: 20px;
    cursor: pointer;
    transition: transform 1s ease-in-out;
    transition: background-color 0.3s ease-in-out;
    /* From https://css.glass */
background: rgba(255, 255, 255, 0.31);
border-radius: 16px;
box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
backdrop-filter: blur(3.8px);
-webkit-backdrop-filter: blur(3.8px);
border: 1px solid rgba(255, 255, 255, 0.3);
}
.imageCard:hover {
    background-color: var(--lightBlue);
    transform: translateY(-2px);
}
.imageCard > p {
    color: black;
    font-weight: 400;
    text-decoration: none;
}
.imageCard > a {
    text-decoration: none;
}
</style>
</head>
<body>
<section class="cardBar">
    <a href="https://chatgpt.com/" target="_blank">
    <div class="imageCard">
    <img src="Images/chatgpt_logo.svg.png" alt="Icon of OpenAI's ChatGPT">
        <p>ChatGPT</p>
    </div></a>
    <a href="https://claude.ai" target="_blank">
    <div class="imageCard">
    <img src="Images/claude_logo.svg.png" alt="Icon of OpenAI's ChatGPT">
        <p>Claude</p>
    </div></a>
    <a href="https://gemini.google.com/" target="_blank">
    <div class="imageCard">
    <img src="Images/gemini_logo.png" alt="Icon of OpenAI's ChatGPT">
        <p style="text-decoration: none;">Gemini</p>
    </div></a>
</section>
</body>
</html>
